<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .active_mode {
            background: #6D4AFF;
        }
    </style>
</head>

<body>
    <div class="w-screen h-screen flex justify-center items-center">
        <div class="max-w-[600px] w-full p-5 md:p-10 bg-[#111827] rounded-xl flex flex-col items-center gap-5 md:gap-7">
            <!-- lock icon -->
            <div class="rounded-full bg-[#6D4AFF]/10 p-2 md:p-3 border border-[#6D4AFF]/20">
                <img src="./pages/src/icon-lock.svg" class="w-7 md:w-10" alt="lock">
            </div>
            <!-- header -->
            <div class="text-center">
                <h1 class="text-white text-xl md:text-3xl mb-1 md:mb-2 font-medium">Welcom Back</h1>
                <p class="text-[#6B7280] text-[11px] md:text-sm">Login to access your account</p>
            </div>
            <!-- User or Admin -->
            <div class="text-white max-w-[400px] w-full flex bg-[#161D29] rounded">
                <button type="button" class="active_mode w-1/2 p-3 rounded-l cursor-pointer" id="userBtn">USER</button>
                <button type="button" class="w-1/2 p-3 rounded-r cursor-pointer" id="adminBtn">ADMIN</button>
            </div>
            <!-- Form -->
            <form action="" class="w-full max-w-[400px]">
                <div class="text-white">
                    <label for="username" class="ml-2 font-bold text-[12px] text-[#6B7280]">User name</label>
                    <input type="text" id="username" placeholder="Enter your username"
                        class="w-full px-3 py-1 border-2 border-[#6B7280]/20 rounded-lg mt-1 placeholder:text-[#6B7280] placeholder:text-sm">
                </div>
                <div class="text-white mt-2 md:mt-5" id="fullnameInput">
                    <label for="fullname" class="ml-2 font-bold text-[12px] text-[#6B7280]">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your fullname"
                        class="w-full px-3 py-1 border-2 border-[#6B7280]/20 rounded-lg mt-1 placeholder:text-[#6B7280] placeholder:text-sm">
                </div>
                <div class="text-white mt-2 md:mt-5">
                    <label for="password" class="ml-2 font-bold text-[12px] text-[#6B7280]">Password</label>
                    <input type="text" id="password" placeholder="Enter your password"
                        class="w-full px-3 py-1 border-2 border-[#6B7280]/20 rounded-lg mt-1 placeholder:text-[#6B7280] placeholder:text-sm">
                </div>
                <div class="w-full flex justify-center mt-10">
                    <button type="submit" class="w-full max-w-[300px] bg-[#6D4AFF] hover:bg-[#7F5DFF] px-5 py-2 rounded-lg text-white font-medium tracking-widest cursor-pointer ">SUBMIT</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
